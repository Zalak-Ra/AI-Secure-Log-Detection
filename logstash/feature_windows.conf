input {
  kafka {
    bootstrap_servers => "localhost:9092"
    topics => ["infra.feature.windows"]
    group_id => "logstash-feature-windows"
    codec => json
    auto_offset_reset => "latest"
  }
}

filter {
  date {
    match => ["window_end", "ISO8601"]
    target => "@timestamp"
  }

  mutate {
    add_field => {
      "[data_stream][type]" => "logs"
      "[data_stream][dataset]" => "infra_feature_windows"
      "[data_stream][namespace]" => "default"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://localhost:9200"]
    data_stream => true
    data_stream_type => "logs"
    data_stream_dataset => "infra_feature_windows"
    data_stream_namespace => "default"
    ecs_compatibility => "v8"
  }
}
